# Upstream PHP-FPM
upstream php_backend {
    server php:9000;
}

# Detect HTTPS from host reverse proxy
map $http_x_forwarded_proto $fastcgi_https {
    https on;
    default '';
}

# HTTP Server (SSL is terminated by host nginx reverse proxy)
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Fix malformed Telegram URLs with path traversal
    location ~ ^/telegram/catalog\.\./\.\./telegram/(.*)$ {
        rewrite ^/telegram/catalog\.\./\.\./telegram/(.*)$ /telegram/$1 last;
    }

    # API Backend (Symfony) - must be BEFORE frontend
    location /api {
        try_files $uri @symfony;
    }

    # Telegram API Backend (Symfony)
    location ~ ^/telegram {
        fastcgi_pass php_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTPS $fastcgi_https;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
    }

    # Symfony PHP handler
    location @symfony {
        fastcgi_pass php_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTPS $fastcgi_https;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
    }

    # Frontend static files (Vue.js)
    location / {
        root /var/www/frontend;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Serve uploaded media files
    location /media {
        alias /var/www/html/public/media;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ ^/(config|migrations|src|var|vendor)/? {
        deny all;
        return 404;
    }
}
